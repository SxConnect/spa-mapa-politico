# Docker Compose para uso com Traefik
# Este arquivo assume que você já tem Traefik rodando

version: '3.8'

services:
  mapa-politico:
    image: ghcr.io/sxconnect/spa-mapa-politico:latest
    container_name: mapa-politico
    restart: unless-stopped
    # NÃO expor portas quando usar Traefik (comunicação interna)
    volumes:
      - mapa-data:/app/data
      - mapa-uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
      - VITE_ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - VITE_ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
    networks:
      - traefik-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      # === CONFIGURAÇÃO BÁSICA ===
      - "traefik.enable=true"
      - "traefik.docker.network=traefik-network"
      
      # === ROTEADOR HTTP (redireciona para HTTPS) ===
      - "traefik.http.routers.mapa-http.rule=Host(`mapa.seudominio.com`)"
      - "traefik.http.routers.mapa-http.entrypoints=web"
      - "traefik.http.routers.mapa-http.middlewares=redirect-to-https"
      
      # === ROTEADOR HTTPS ===
      - "traefik.http.routers.mapa-https.rule=Host(`mapa.seudominio.com`)"
      - "traefik.http.routers.mapa-https.entrypoints=websecure"
      - "traefik.http.routers.mapa-https.tls=true"
      - "traefik.http.routers.mapa-https.tls.certresolver=letsencrypt"
      - "traefik.http.routers.mapa-https.middlewares=mapa-security"
      
      # === SERVIÇO ===
      - "traefik.http.services.mapa-service.loadbalancer.server.port=3001"
      
      # === MIDDLEWARES ===
      # Redirecionamento HTTPS
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.redirect-to-https.redirectscheme.permanent=true"
      
      # Headers de segurança
      - "traefik.http.middlewares.mapa-security.headers.accesscontrolallowmethods=GET,POST,PUT,DELETE,OPTIONS"
      - "traefik.http.middlewares.mapa-security.headers.accesscontrolalloworiginlist=https://mapa.seudominio.com"
      - "traefik.http.middlewares.mapa-security.headers.accesscontrolmaxage=100"
      - "traefik.http.middlewares.mapa-security.headers.addvaryheader=true"
      - "traefik.http.middlewares.mapa-security.headers.referrerpolicy=same-origin"
      - "traefik.http.middlewares.mapa-security.headers.framedeny=true"
      - "traefik.http.middlewares.mapa-security.headers.contenttypenosniff=true"
      - "traefik.http.middlewares.mapa-security.headers.browserxssfilter=true"
      - "traefik.http.middlewares.mapa-security.headers.stsincludesubdomains=true"
      - "traefik.http.middlewares.mapa-security.headers.stspreload=true"
      - "traefik.http.middlewares.mapa-security.headers.stsseconds=31536000"

volumes:
  mapa-data:
    driver: local
  mapa-uploads:
    driver: local

networks:
  traefik-network:
    external: true