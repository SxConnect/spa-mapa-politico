version: '3.8'

services:
  mapa-politico:
    image: ghcr.io/sxconnect/spa-mapa-politico:latest
    container_name: mapa-politico
    restart: unless-stopped
    ports:
      - "8083:3001"
    volumes:
      - mapa-data:/app/data
      - mapa-uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Configure suas credenciais de admin
      - VITE_ADMIN_USERNAME=${ADMIN_USERNAME}
      - VITE_ADMIN_PASSWORD=${ADMIN_PASSWORD}
    networks:
      - mapa-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  mapa-data:
    driver: local
  mapa-uploads:
    driver: local

networks:
  mapa-network:
    driver: bridge