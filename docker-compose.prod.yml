version: '3.8'

services:
  mapa-politico:
    image: ghcr.io/sxconnect/spa-mapa-politico:latest
    container_name: mapa-politico-prod
    restart: unless-stopped
    ports:
      - "8083:3001"
    volumes:
      - mapa-data:/app/data
      - mapa-uploads:/app/public/uploads
    environment:
      - NODE_ENV=production
      - PORT=3001
      # Defina suas credenciais de admin aqui ou via variáveis de ambiente
      - VITE_ADMIN_USERNAME=admin
      - VITE_ADMIN_PASSWORD=SuaSenhaSegura123!
    networks:
      - mapa-network
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3001/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mapa-politico.rule=Host(`seu-dominio.com`)"
      - "traefik.http.routers.mapa-politico.tls=true"
      - "traefik.http.routers.mapa-politico.tls.certresolver=letsencrypt"
      - "traefik.http.services.mapa-politico.loadbalancer.server.port=3001"

volumes:
  mapa-data:
    driver: local
  mapa-uploads:
    driver: local

networks:
  mapa-network:
    driver: bridge